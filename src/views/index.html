<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Workbench</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="/css/output.css">
</head>
<body class="bg-zinc-950 text-zinc-100 h-screen flex overflow-hidden">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-72 border-r border-zinc-800 flex flex-col bg-zinc-950 shrink-0">
    <div class="px-4 py-4 border-b border-zinc-800">
      <button id="new-chat-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
        + New Chat
      </button>
    </div>
    <div id="conversation-list" class="flex-1 overflow-y-auto slim-scrollbar">
    </div>
  </aside>

  <!-- Main area -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- Status bar -->
    <header id="status-bar" class="border-b border-zinc-800 px-4 py-2 flex items-center gap-4 text-xs">
      <div class="flex items-center gap-2">
        <span id="health-dot" class="inline-block w-2 h-2 rounded-full bg-zinc-600"></span>
        <span id="health-label" class="text-zinc-500">llama.cpp</span>
      </div>
      <div class="flex items-center gap-2">
        <span id="inet-dot" class="inline-block w-2 h-2 rounded-full bg-zinc-600"></span>
        <span id="inet-label" class="text-zinc-500">Internet</span>
      </div>
      <div class="relative flex items-center gap-2">
        <span id="search-dot" class="inline-block w-2 h-2 rounded-full bg-zinc-600"></span>
        <button id="search-toggle" class="text-zinc-500 hover:text-zinc-300 transition-colors flex items-center gap-1">
          <span id="search-label">Search</span>
          <svg class="w-3 h-3 opacity-60" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5l3 3 3-3"/></svg>
        </button>
        <div id="search-dropdown" class="hidden absolute top-full left-0 mt-1 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg py-1 z-50 min-w-[140px]">
        </div>
      </div>
      <div id="liteapi-status" class="flex items-center gap-2 hidden">
        <span id="liteapi-dot" class="inline-block w-2 h-2 rounded-full bg-zinc-600"></span>
        <span id="liteapi-label" class="text-zinc-500">LiteAPI</span>
      </div>
      <div id="etrade-status" class="relative flex items-center gap-2 hidden">
        <span id="etrade-dot" class="inline-block w-2 h-2 rounded-full bg-zinc-600"></span>
        <button id="etrade-toggle" class="text-zinc-500 hover:text-zinc-300 transition-colors">E*TRADE</button>
        <div id="etrade-panel" class="hidden absolute top-full left-0 mt-1 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg p-3 z-50 min-w-[260px]">
          <div id="etrade-panel-content"></div>
        </div>
      </div>
      <button id="slots-toggle" class="text-zinc-500 hover:text-zinc-300 transition-colors hidden">
        Slots: <span id="slots-summary">—</span>
      </button>
      <div class="relative flex items-center gap-2">
        <button id="tool-usage-toggle" class="text-zinc-600 hover:text-zinc-400 transition-colors flex items-center gap-1 hidden">
          <span>🔧</span>
          <span id="tool-usage-count">0</span>
        </button>
        <div id="tool-usage-dropdown" class="hidden absolute top-full right-0 mt-1 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg py-1 z-50 min-w-[160px]">
        </div>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <div class="relative flex items-center mr-6">
          <button id="tools-toggle" class="text-indigo-400 hover:text-indigo-300 transition-colors text-xs">Tools</button>
          <div id="tools-dropdown" class="hidden absolute top-full right-0 mt-2 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg z-50 w-80 max-h-80 overflow-y-auto slim-scrollbar">
            <div id="tools-list" class="py-1"></div>
          </div>
        </div>
        <div class="relative flex items-center">
          <button id="prompts-toggle" class="text-indigo-400 hover:text-indigo-300 transition-colors text-xs">Prompts</button>
          <div id="prompts-dropdown" class="hidden absolute top-full right-0 mt-2 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg z-50 max-h-64 overflow-y-auto slim-scrollbar" style="width:max-content;min-width:12rem;max-width:32rem">
            <div id="prompt-list" class="py-1"></div>
          </div>
        </div>
        <span class="text-zinc-500">Context:</span>
        <div class="w-32 h-2 bg-zinc-800 rounded-full overflow-hidden">
          <div id="context-bar" class="h-full bg-indigo-500 rounded-full transition-all" style="width: 0%"></div>
        </div>
        <span id="context-label" class="text-zinc-500">0 / 131K</span>
      </div>
    </header>

    <!-- Slot panel (collapsible) -->
    <div id="slot-panel" class="border-b border-zinc-800 px-4 py-3 hidden">
      <div id="slot-cards" class="flex gap-3 flex-wrap"></div>
    </div>

    <!-- Chat area -->
    <div id="response-area" class="flex-1 overflow-y-auto px-4 py-6 space-y-4 slim-scrollbar">
      <div id="empty-state" class="text-zinc-500 text-sm text-center" style="margin-top: 40vh;">
        Create or select a conversation to get started.
      </div>
    </div>

    <!-- Input form -->
    <form id="prompt-form" class="border-t border-zinc-800 bg-zinc-900 p-4">
      <div class="max-w-4xl mx-auto">
        <!-- Image preview strip -->
        <div id="image-preview-strip" class="hidden flex gap-2 mb-2 flex-wrap"></div>
        <div class="flex gap-3 items-end">
          <input type="file" id="image-input" accept="image/*" multiple class="hidden">
          <button
            type="button"
            id="attach-btn"
            title="Attach image"
            class="text-zinc-500 hover:text-zinc-300 transition-colors px-2 py-3 text-lg shrink-0"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
          <label id="applet-toggle-label" title="Enable applet visualizations"
            class="flex items-center gap-1.5 text-zinc-500 hover:text-zinc-300 transition-colors px-1 py-3 text-xs shrink-0 cursor-pointer select-none">
            <input type="checkbox" id="applet-toggle" class="accent-indigo-500 w-3.5 h-3.5" checked>
            Applets
          </label>
          <label id="autorun-toggle-label" title="Auto-approve Python script execution"
            class="flex items-center gap-1.5 text-zinc-500 hover:text-zinc-300 transition-colors px-1 py-3 text-xs shrink-0 cursor-pointer select-none">
            <input type="checkbox" id="autorun-toggle" class="accent-amber-500 w-3.5 h-3.5">
            Autorun
          </label>
          <textarea
            id="prompt-input"
            name="prompt"
            rows="2"
            placeholder="Type your message…"
            class="flex-1 bg-zinc-800 text-zinc-100 placeholder-zinc-600 resize-none outline-none text-sm leading-relaxed rounded-lg px-4 py-3 border border-zinc-700 focus:border-zinc-500 slim-scrollbar"
          ></textarea>
          <button
            type="button"
            id="clear-prompt-btn"
            title="Clear prompt"
            class="text-zinc-600 hover:text-zinc-300 transition-colors px-1 py-3 text-sm shrink-0"
          >&#10005;</button>
          <button
            type="submit"
            id="send-btn"
            class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-5 py-3 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Send
          </button>
          <button
            type="button"
            id="save-prompt-btn"
            title="Save as prompt"
            class="bg-zinc-700 hover:bg-zinc-600 text-zinc-300 text-sm font-medium px-3 py-3 rounded-lg transition-colors"
          >
            Save
          </button>
        </div>
      </div>
    </form>
  </div>


</body>
<script src="/js/app.js?v=2"></script>
</html>
