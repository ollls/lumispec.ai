<!DOCTYPE html>
<!-- Tailwind safelist (classes used dynamically in JS): group relative group-hover:opacity-50 hover:!opacity-100 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Workbench</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="/lib/flatpickr-dark.css">
  <link rel="stylesheet" href="/css/output.css">
  <style>
    /* Session button colors — easy to tweak */
    :root {
      --btn-blue:  #4f46e5;   /* indigo-600 */
      --btn-cyan:  #0891b2;   /* cyan-600 */
      --btn-amber: #FFC107;   /* amber */
      --btn-coral: #FF7043;   /* coral */
      --btn-sgreen: #607D6B; /* slate green */
      --btn-navy: #1B2A4A;   /* charcoal navy */
      --btn-lavender: #E8E0F0; /* lavender mist */
      --btn-purple: #A855F7;  /* purple */
      --btn-hotpink: #EC4899; /* hot pink */
      --btn-sky: #06B6D4;     /* sky cyan */
    }
    .session-btn:hover { filter: brightness(1.2); }
    .session-btn { position: relative; }
    .session-btn[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #27272a;
      color: #d4d4d8;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      z-index: 100;
      border: 1px solid #3f3f46;
    }

    /* Flatpickr zinc/indigo overrides */
    .flatpickr-calendar { background: #1c1c22 !important; border-color: #3f3f46 !important; font-size: 13px; }
    .flatpickr-months .flatpickr-month { background: #1c1c22 !important; }
    .flatpickr-current-month .flatpickr-monthDropdown-months { background: #1c1c22 !important; }
    .flatpickr-weekdays { background: #1c1c22 !important; }
    span.flatpickr-weekday { color: #71717a !important; }
    .flatpickr-day { color: #d4d4d8 !important; }
    .flatpickr-day:hover { background: #27272a !important; border-color: #27272a !important; }
    .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange {
      background: #4f46e5 !important; border-color: #4f46e5 !important; color: #fff !important;
    }
    .flatpickr-day.inRange { background: #312e81 !important; border-color: #312e81 !important; box-shadow: -5px 0 0 #312e81, 5px 0 0 #312e81 !important; }
    .flatpickr-day.today { border-color: #6366f1 !important; }
    .flatpickr-day.today:hover { background: #4f46e5 !important; }
    .flatpickr-months .flatpickr-prev-month, .flatpickr-months .flatpickr-next-month { fill: #a1a1aa !important; }
    .flatpickr-months .flatpickr-prev-month:hover svg, .flatpickr-months .flatpickr-next-month:hover svg { fill: #e4e4e7 !important; }
    .flatpickr-calendar.static { position: relative !important; margin-top: 4px; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 h-screen flex flex-col overflow-hidden">

  <!-- Top bar (full width) -->
  <header id="status-bar" class="border-b border-zinc-800 px-4 py-2 flex items-center gap-4 text-xs shrink-0">
    <!-- Session buttons -->
    <div class="flex items-center gap-1.5 mr-2">
      <button id="new-chat-blue"
        class="session-btn text-white text-xs font-medium px-3 py-1.5 rounded transition-colors"
        data-session="blue" style="background:var(--btn-blue);">+</button>
      <button id="new-chat-cyan"
        class="session-btn text-white text-xs font-medium px-3 py-1.5 rounded transition-colors"
        data-session="cyan" style="background:var(--btn-cyan);">+</button>
      <button id="new-chat-amber"
        class="session-btn text-xs font-medium px-3 py-1.5 rounded transition-colors"
        data-session="amber" style="background:var(--btn-amber); color:#000;">+</button>
      <button id="new-chat-coral"
        class="session-btn text-white text-xs font-medium px-3 py-1.5 rounded transition-colors"
        data-session="coral" style="background:var(--btn-coral);">+</button>
      <button id="new-chat-sgreen"
        class="session-btn text-white text-xs font-medium px-3 py-1.5 rounded transition-colors"
        data-session="sgreen" style="background:var(--btn-sgreen);">+</button>
      <button id="new-chat-navy"
        class="session-btn text-white text-xs font-medium px-3 py-1.5 rounded transition-colors"
        data-session="navy" style="background:var(--btn-navy);">+</button>
      <button id="new-chat-lavender"
        class="session-btn text-xs font-medium px-3 py-1.5 rounded transition-colors"
        data-session="lavender" style="background:var(--btn-lavender); color:#000;">+</button>
      <button id="session-expand" class="text-zinc-600 hover:text-zinc-400 transition-colors text-xs px-1 cursor-pointer" title="More sessions">›</button>
      <span id="session-extra" class="hidden flex items-center gap-1.5">
        <button id="new-chat-purple"
          class="session-btn text-xs font-medium px-3 py-1.5 rounded transition-colors"
          data-session="purple" style="background:var(--btn-purple);">+</button>
        <button id="new-chat-hotpink"
          class="session-btn text-xs font-medium px-3 py-1.5 rounded transition-colors"
          data-session="hotpink" style="background:var(--btn-hotpink);">+</button>
        <button id="new-chat-sky"
          class="session-btn text-xs font-medium px-3 py-1.5 rounded transition-colors"
          data-session="sky" style="background:var(--btn-sky);">+</button>
      </span>
    </div>
    <div class="w-px self-stretch bg-zinc-700"></div>
    <!-- Status indicators: flex-wrap layout -->
    <div class="flex flex-wrap items-center gap-x-8 gap-y-0.5">
      <!-- Hardcoded: LLM -->
      <div class="relative flex items-center gap-2">
        <span id="llm-dot" class="inline-block w-2 h-2 rounded-full bg-zinc-600"></span>
        <button id="llm-toggle" class="text-zinc-500 hover:text-zinc-300 transition-colors flex items-center gap-1">
          <span id="llm-label">LLM</span>
          <svg class="w-3 h-3 opacity-60" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5l3 3 3-3"/></svg>
        </button>
        <div id="llm-dropdown" class="hidden absolute top-full left-0 mt-1 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg py-1 z-50 min-w-[140px]">
        </div>
      </div>
      <!-- Hardcoded: Internet -->
      <div class="flex items-center gap-2">
        <span id="inet-dot" class="inline-block w-2 h-2 rounded-full bg-zinc-600"></span>
        <span id="inet-label" class="text-zinc-500">Internet</span>
      </div>
      <!-- Dynamic plugin status dots inserted here by JS -->
      <div id="plugin-status-container" class="contents"></div>
      <!-- Tool usage -->
      <div class="relative flex items-center gap-2">
        <button id="tool-usage-toggle" class="text-zinc-600 hover:text-zinc-400 transition-colors flex items-center gap-1 hidden">
          <span>🔧</span>
          <span id="tool-usage-count">0</span>
        </button>
        <div id="tool-usage-dropdown" class="hidden absolute top-full right-0 mt-1 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg py-1 z-50 min-w-[160px]">
        </div>
      </div>
    </div>
      <div class="ml-auto mr-10 flex items-center gap-6">
        <div class="relative flex items-center">
          <button id="plugins-toggle" class="text-indigo-400 hover:text-indigo-300 transition-colors text-xs" title="Enable/disable plugin groups">Plugins</button>
        </div>
        <div class="relative flex items-center">
          <button id="prompts-toggle" class="text-indigo-400 hover:text-indigo-300 transition-colors text-xs" title="Saved prompts — click to load into input">Prompts</button>
          <div id="prompts-dropdown" class="hidden absolute top-full left-0 mt-2 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg z-50 max-h-[80vh] overflow-y-auto slim-scrollbar" style="width:max-content;min-width:12rem;max-width:32rem">
            <div id="prompt-list" class="py-1"></div>
          </div>
        </div>
        <div class="relative flex items-center">
          <button id="sessions-toggle" class="text-indigo-400 hover:text-indigo-300 transition-colors text-xs" title="Init prompts per session color — auto-sent on new chat">Sessions</button>
          <div id="sessions-dropdown" class="hidden absolute top-full left-0 mt-2 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg z-50 max-h-[80vh] overflow-y-auto slim-scrollbar" style="width:max-content;min-width:12rem;max-width:32rem">
            <div id="session-list" class="py-1"></div>
          </div>
        </div>
        <div class="relative flex items-center">
          <button id="compacts-toggle" class="text-indigo-400 hover:text-indigo-300 transition-colors text-xs" title="Summary prompts per session color — used when compacting conversations">Compacts</button>
          <div id="compacts-dropdown" class="hidden absolute top-full left-0 mt-2 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg z-50 max-h-[80vh] overflow-y-auto slim-scrollbar" style="width:max-content;min-width:12rem;max-width:32rem">
            <div id="compact-list" class="py-1"></div>
          </div>
        </div>
        <div class="relative flex items-center">
          <button id="tasks-toggle" class="text-indigo-400 hover:text-indigo-300 transition-colors text-xs" title="Saved task lists — click to load into input">Tasks</button>
          <div id="tasks-dropdown" class="hidden absolute top-full left-0 mt-2 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg z-50 max-h-[80vh] overflow-y-auto slim-scrollbar" style="width:max-content;min-width:12rem;max-width:32rem">
            <div id="task-list" class="py-1"></div>
          </div>
        </div>
        <div class="relative flex items-center">
          <button id="templates-toggle" class="text-indigo-400 hover:text-indigo-300 transition-colors text-xs" title="Saved applet templates — click to insert [template: name] tag">Templates</button>
          <div id="templates-dropdown" class="hidden absolute top-full right-0 mt-2 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg z-50 max-h-[80vh] overflow-y-auto slim-scrollbar" style="width:max-content;min-width:12rem;max-width:32rem">
            <div id="template-list" class="py-1"></div>
          </div>
        </div>

      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <span class="text-zinc-500">Context:</span>
          <div class="w-32 h-2 bg-zinc-800 rounded-full overflow-hidden">
            <div id="context-bar" class="h-full bg-indigo-500 rounded-full transition-all" style="width: 0%"></div>
          </div>
          <span id="context-label" class="text-zinc-500">0 / 131K</span>
          <span id="elapsed-timer" class="text-zinc-600 text-xs hidden"></span>
        </div>
        <button id="slots-toggle" class="text-zinc-500 hover:text-zinc-300 transition-colors hidden">
          Slots: <span id="slots-summary">—</span>
        </button>
      </div>
  </header>

  <!-- Content: sidebar + main -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 border-r border-zinc-800 flex flex-col bg-zinc-950 shrink-0">
      <div id="conversation-list" class="flex-1 overflow-y-auto slim-scrollbar">
      </div>
    </aside>

    <!-- Sidebar resize divider -->
    <div id="sidebar-divider" style="width:5px;cursor:col-resize;flex-shrink:0;background:#27272a;transition:background 0.15s" onmouseenter="this.style.background='#6366f1'" onmouseleave="this.style.background='#27272a'"></div>

    <!-- Main area -->
    <div class="flex-1 flex flex-col min-w-0 relative">

    <!-- Slot panel (collapsible) -->
    <div id="slot-panel" class="border-b border-zinc-800 px-4 py-3 hidden">
      <div id="slot-cards" class="flex gap-3 flex-wrap"></div>
    </div>

    <!-- Chat area -->
    <div id="response-area" class="flex-1 overflow-y-auto px-4 py-6 space-y-4 slim-scrollbar">
      <div id="empty-state" class="text-zinc-500 text-sm text-center" style="margin-top: 40vh;">
        Create or select a conversation to get started.
      </div>
    </div>

    <!-- Plugin Config Panel (overlays chat area) -->
    <div id="plugin-config-panel" class="hidden absolute inset-0 z-40 bg-zinc-950 overflow-y-auto slim-scrollbar flex items-start justify-center pt-16 pb-8">
      <div class="w-full max-w-2xl px-6">
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-lg font-semibold text-zinc-200">Plugin Configuration</h2>
          <button id="plugin-config-close" class="text-zinc-500 hover:text-zinc-200 hover:bg-zinc-700 transition-colors text-2xl leading-none w-9 h-9 rounded-lg flex items-center justify-center">&times;</button>
        </div>
        <div id="plugin-config-list" class="space-y-3"></div>
      </div>
    </div>

    <!-- Prompt Variables Modal -->
    <div id="prompt-vars-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/60">
      <div class="bg-zinc-800 border border-zinc-700 rounded-xl shadow-2xl w-full max-w-md mx-4">
        <div class="flex items-center justify-between px-5 py-3 border-b border-zinc-700">
          <h3 class="text-sm font-medium text-zinc-200">Fill in prompt variables</h3>
          <button id="prompt-vars-cancel" class="text-zinc-500 hover:text-zinc-300 text-lg leading-none">&times;</button>
        </div>
        <div id="prompt-vars-fields" class="px-5 py-4 space-y-3 max-h-80 overflow-y-auto slim-scrollbar"></div>
        <div class="flex justify-end gap-2 px-5 py-3 border-t border-zinc-700">
          <button id="prompt-vars-clear" class="text-xs text-zinc-400 hover:text-zinc-200 px-3 py-1.5 rounded transition-colors">Clear all</button>
          <button id="prompt-vars-submit" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-1.5 rounded-lg transition-colors">Apply</button>
        </div>
      </div>
    </div>

    <!-- Resize divider -->
    <div id="resize-divider" style="height:5px;cursor:row-resize;flex-shrink:0;background:#27272a;transition:background 0.15s" onmouseenter="this.style.background='#6366f1'" onmouseleave="this.style.background='#27272a'"></div>

    <!-- Input form -->
    <form id="prompt-form" class="border-t border-zinc-800 bg-zinc-900 p-4 shrink-0 overflow-hidden flex flex-col">
      <div class="flex-1 flex flex-col min-h-0 w-full">
        <!-- Image preview strip -->
        <div id="image-preview-strip" class="hidden flex gap-2 mb-2 flex-wrap"></div>
        <div class="flex gap-3 items-stretch flex-1 min-h-0">
          <input type="file" id="image-input" accept="image/*" multiple class="hidden">
          <div class="flex flex-col items-center shrink-0 py-1 gap-0.5">
            <button
              type="button"
              id="list-mode-btn"
              title="Task list mode — each bullet runs as a separate LLM step with isolated context"
              class="text-zinc-500 hover:text-zinc-300 transition-colors px-2 py-0.5 cursor-pointer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
            </button>
            <button
              type="button"
              id="taskmaster-btn"
              title="Decompose prompt into task pipeline"
              class="text-zinc-500 hover:text-violet-400 transition-colors px-2 py-0.5 cursor-pointer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8 19 13"/><path d="M15 9h0"/><path d="M17.8 6.2 19 5"/><path d="M3 21l9-9"/><path d="M12.2 6.2 11 5"/></svg>
            </button>
            <button
              type="button"
              id="attach-btn"
              title="Attach image"
              class="text-zinc-500 hover:text-zinc-300 transition-colors px-2 py-0.5 text-lg"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <button
              type="button"
              id="terminal-btn"
              class="text-zinc-700 cursor-not-allowed transition-colors px-2 py-0.5"
              title="Terminal in project directory (set TERMINAL in .env)"
              disabled
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="7 15 11 11 7 7"/><line x1="13" y1="15" x2="17" y2="15"/></svg>
            </button>
            <button
              type="button"
              id="project-btn"
              title="Select project directory"
              class="text-zinc-500 hover:text-green-400 transition-colors px-2 py-0.5 cursor-pointer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            </button>
          </div>
          <div class="flex flex-col gap-1 shrink-0 py-1">
            <label id="autorun-toggle-label" title="Auto-approve Python script execution"
              class="slider-toggle flex items-center gap-1.5 px-1 text-xs cursor-pointer select-none" style="--slider-color:#f59e0b">
              <input type="checkbox" id="autorun-toggle" class="hidden">
              <span class="slider-track"></span>
              <span class="slider-label">Autorun</span>
            </label>
            <label id="think-toggle-label" title="Show thinking process and tool usage"
              class="slider-toggle flex items-center gap-1.5 px-1 text-xs cursor-pointer select-none" style="--slider-color:#6366f1">
              <input type="checkbox" id="think-toggle" class="hidden" checked>
              <span class="slider-track"></span>
              <span class="slider-label">Think</span>
            </label>
            <label id="review-toggle-label" title="Pause after each task step for review before continuing"
              class="slider-toggle flex items-center gap-1.5 px-1 text-xs cursor-pointer select-none" style="--slider-color:#f59e0b">
              <input type="checkbox" id="review-toggle" class="hidden">
              <span class="slider-track"></span>
              <span class="slider-label">Review</span>
            </label>
            <label id="precision-toggle-label" title="Enforce strict computation — no mental math, use Python for all calculations"
              class="slider-toggle flex items-center gap-1.5 px-1 text-xs cursor-pointer select-none" style="--slider-color:#10b981">
              <input type="checkbox" id="precision-toggle" class="hidden">
              <span class="slider-track"></span>
              <span class="slider-label">Precision</span>
            </label>
          </div>
          <textarea
            id="prompt-input"
            name="prompt"
            placeholder="Type your message…"
            style="height:100%"
            class="flex-1 bg-zinc-800 text-zinc-100 placeholder-zinc-600 resize-none outline-none text-sm leading-relaxed rounded-lg px-4 py-3 border border-zinc-700 focus:border-zinc-500 slim-scrollbar min-h-0"
          ></textarea>
          <div class="flex flex-col items-center shrink-0 py-1 gap-0.5">
            <button
              type="submit"
              id="send-btn"
              title="Send message"
              class="text-indigo-400 hover:text-indigo-300 transition-colors px-2 py-0.5 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
            <button
              type="button"
              id="stop-btn"
              title="Stop streaming"
              class="hidden text-red-500 hover:text-red-400 transition-colors px-2 py-0.5 cursor-pointer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            </button>
            <button
              type="button"
              id="save-prompt-btn"
              title="Save as prompt or task"
              class="text-zinc-500 hover:text-zinc-300 transition-colors px-2 py-0.5 cursor-pointer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button
              type="button"
              id="save-session-btn"
              title="Save as session prompt"
              class="text-zinc-500 hover:text-zinc-300 transition-colors px-2 py-0.5 cursor-pointer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            </button>
            <button
              type="button"
              id="save-compact-btn"
              title="Save as compact prompt"
              class="text-zinc-500 hover:text-zinc-300 transition-colors px-2 py-0.5 cursor-pointer"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h10"/></svg>
            </button>
            <button
              type="button"
              id="clear-prompt-btn"
              title="Clear prompt"
              class="text-zinc-500 hover:text-red-400 transition-colors px-2 py-0.5 cursor-pointer"
            >
